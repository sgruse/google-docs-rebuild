# This is the Spring Boot's main entry file and tells Spring how to configure itself when it starts up.
# Start the server on port 8080
# Connect to Postgres at this URL with these credentials
# Use this Redis host and port
# Tell Hibernate not to auto-create tables
# Tell Flyway where to find migration scripts

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:doccollab}
    username: ${DB_USERNAME:doccollab}
    password: ${DB_PASSWORD:doccollab}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
